name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:12
        env:
          POSTGRES_DB: accounting_test
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: user
      PGPASSWORD: password
      PGDATABASE: accounting
      PGDATABASE_TEST: accounting_test
      APP_ENV: test
      # Keycloak + QB values not needed for unit/integration tests
      KEYCLOAK_SERVER_URL: http://localhost:8080
      KEYCLOAK_REALM: test
      KEYCLOAK_CLIENT_ID: test-client
      KEYCLOAK_CLIENT_SECRET: test-secret
      QB_CLIENT_ID: test-qb-client
      QB_CLIENT_SECRET: test-qb-secret
      QB_REDIRECT_URI: http://localhost:8190/v1/quickbooks/auth/callback

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:coverage
