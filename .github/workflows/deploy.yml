name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="staging"
          fi
          echo "image_tag=${TAG}" >> $GITHUB_OUTPUT
          echo "git_sha=${SHA}" >> $GITHUB_OUTPUT

      - name: Log in to registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ secrets.REGISTRY_URL }} -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

      - name: Build and push image
        run: |
          IMAGE="${{ secrets.REGISTRY_URL }}/vh/vh-srv-accounting"
          TAG="${{ steps.meta.outputs.image_tag }}"
          SHA="${{ steps.meta.outputs.git_sha }}"
          docker build --build-arg GIT_SHA=${SHA} -t ${IMAGE}:${TAG} -t ${IMAGE}:${SHA} .
          docker push ${IMAGE}:${TAG}
          docker push ${IMAGE}:${SHA}

  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, staging]

    steps:
      - name: Deploy to staging
        env:
          IMAGE_NAME: "${{ secrets.REGISTRY_URL }}/vh/vh-srv-accounting:staging"
          APP_ENV: staging
          GIT_SHA: ${{ needs.build.outputs.image_tag }}
        run: |
          docker compose -f /opt/vh/vh-srv-accounting/docker-compose.yml pull
          docker compose -f /opt/vh/vh-srv-accounting/docker-compose.yml up -d

  deploy-production:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, production]
    environment: production

    steps:
      - name: Deploy to production
        env:
          IMAGE_NAME: "${{ secrets.REGISTRY_URL }}/vh/vh-srv-accounting:${{ github.ref_name }}"
          APP_ENV: production
          GIT_SHA: ${{ github.ref_name }}
        run: |
          docker compose -f /opt/vh/vh-srv-accounting/docker-compose.yml pull
          docker compose -f /opt/vh/vh-srv-accounting/docker-compose.yml up -d
